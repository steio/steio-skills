name: Publish Tiles

permissions:
  id-token: write
  contents: write

on:
  push:
    branches:
      - main
    paths:
      - 'tiles/**/tile.json'
      - 'tiles/**/SKILL.md'
      - 'tiles/**/evals/**'

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      tiles: ${{ steps.detect.outputs.tiles }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed tiles
        id: detect
        run: |
          CHANGED_FILES=$(git diff --name-only HEAD^ HEAD -- 'tiles/*')
          
          TILES=$(echo "$CHANGED_FILES" | grep -oP '^tiles/[^/]+/[^/]+' | sort -u | jq -R -s -c 'split("\n") | map(select(length > 0))')
          
          echo "tiles=$TILES" >> $GITHUB_OUTPUT
          echo "Changed tiles: $TILES"

  publish:
    needs: detect-changes
    if: needs.detect-changes.outputs.tiles != '[]' && needs.detect-changes.outputs.tiles != ''
    runs-on: ubuntu-latest
    strategy:
      matrix:
        tile: ${{ fromJson(needs.detect-changes.outputs.tiles) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 2

      - name: Publish tile
        uses: tesslio/publish@main
        with:
          token: ${{ secrets.TESSL_API_TOKEN }}
          path: ${{ matrix.tile }}

      - name: Commit version bump if any
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git pull --rebase
          
          # Stage any changes from publish action (e.g., auto-bump)
          git add -A
          
          # Check if there are staged changes to commit
          if git diff --cached --quiet; then
            echo "No new changes to commit (version already bumped in incoming commit)"
          else
            git commit -m "chore: version bump after auto-publish"
            git push
          fi

  summary:
    needs: publish
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Summary
        run: |
          echo "## Tile Publishing Complete" >> $GITHUB_STEP_SUMMARY
          echo "Published tiles from this commit." >> $GITHUB_STEP_SUMMARY