name: Publish Tiles

permissions:
  id-token: write
  contents: write

on:
  push:
    branches:
      - main
    paths:
      - 'tiles/**/tile.json'
      - 'tiles/**/SKILL.md'
      - 'tiles/**/evals/**'

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      tiles: ${{ steps.detect.outputs.tiles }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed tiles
        id: detect
        run: |
          CHANGED_FILES=$(git diff --name-only HEAD^ HEAD -- 'tiles/*')
          
          TILES=$(echo "$CHANGED_FILES" | grep -oP '^tiles/[^/]+/[^/]+' | sort -u | jq -R -s -c 'split("\n") | map(select(length > 0))')
          
          echo "tiles=$TILES" >> $GITHUB_OUTPUT
          echo "Changed tiles: $TILES"

  publish:
    needs: detect-changes
    if: needs.detect-changes.outputs.tiles != '[]' && needs.detect-changes.outputs.tiles != ''
    runs-on: ubuntu-latest
    strategy:
      matrix:
        tile: ${{ fromJson(needs.detect-changes.outputs.tiles) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Tessl CLI
        run: |
          curl -fsSL https://get.tessl.io | sh

      - name: Configure Tessl
        run: |
          tessl auth login --token ${{ secrets.TESSL_API_TOKEN }}

      - name: Check if version bump needed
        id: version
        run: |
          TILE_PATH="${{ matrix.tile }}"
          TILE_NAME=$(basename "$TILE_PATH")
          
          CURRENT_VERSION=$(cat "$TILE_PATH/tile.json" | jq -r '.version')
          echo "current_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          
          REGISTRY_VERSION=$(tessl tile view "$TILE_NAME" --json 2>/dev/null | jq -r '.version' || echo "0.0.0")
          echo "registry_version=$REGISTRY_VERSION" >> $GITHUB_OUTPUT
          
          if [ "$CURRENT_VERSION" = "$REGISTRY_VERSION" ]; then
            echo "needs_bump=true" >> $GITHUB_OUTPUT
            echo "⚠️ Version $CURRENT_VERSION already exists in registry, will bump"
          else
            echo "needs_bump=false" >> $GITHUB_OUTPUT
            echo "✅ Version $CURRENT_VERSION is new"
          fi

      - name: Bump version if needed
        if: steps.version.outputs.needs_bump == 'true'
        run: |
          TILE_PATH="${{ matrix.tile }}"
          
          NEW_VERSION=$(cat "$TILE_PATH/tile.json" | jq -r '.version' | awk -F. '{print $1"."$2"."$3+1}')
          
          jq --arg v "$NEW_VERSION" '.version = $v' "$TILE_PATH/tile.json" > tmp.json && mv tmp.json "$TILE_PATH/tile.json"
          
          echo "Bumped version to $NEW_VERSION"

      - name: Publish tile
        run: |
          TILE_PATH="${{ matrix.tile }}"
          
          tessl tile publish "$TILE_PATH" --skip-evals
          
          echo "✅ Published ${{ matrix.tile }}"

      - name: Run evals
        run: |
          TILE_PATH="${{ matrix.tile }}"
          
          if [ -d "$TILE_PATH/evals" ]; then
            echo "Running evals for $TILE_PATH..."
            tessl eval run "$TILE_PATH" --agent=claude:claude-sonnet-4-6 || true
          fi

      - name: Commit version bump
        if: steps.version.outputs.needs_bump == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          TILE_PATH="${{ matrix.tile }}"
          NEW_VERSION=$(cat "$TILE_PATH/tile.json" | jq -r '.version')
          
          git add "$TILE_PATH/tile.json"
          git commit -m "chore: bump ${{ matrix.tile }} to $NEW_VERSION after publish"
          git push

  summary:
    needs: publish
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Summary
        run: |
          echo "## Tile Publishing Complete" >> $GITHUB_STEP_SUMMARY
          echo "Published tiles from this commit." >> $GITHUB_STEP_SUMMARY