name: Review Skills

on:
  pull_request:
    paths:
      - 'tiles/**/SKILL.md'

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get changed skill files
        id: changed
        run: |
          SKILLS=$(gh api repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/files --jq '.[].filename' | grep 'SKILL.md$' || true)
          echo "skills<<EOF" >> $GITHUB_OUTPUT
          echo "$SKILLS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Install Tessl CLI
        if: steps.changed.outputs.skills != ''
        run: |
          curl -fsSL https://get.tessl.io | sh

      - name: Review skills
        if: steps.changed.outputs.skills != ''
        id: review
        run: |
          REVIEWS=""
          for skill in ${{ steps.changed.outputs.skills }}; do
            if [ -f "$skill" ]; then
              RESULT=$(tessl skill review "$skill" 2>&1 || true)
              REVIEWS="${REVIEWS}### Review: $skill\n\n\`\`\`\n${RESULT}\n\`\`\`\n\n"
            fi
          done
          echo "reviews<<EOF" >> $GITHUB_OUTPUT
          echo -e "$REVIEWS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Comment on PR
        if: steps.changed.outputs.skills != ''
        uses: actions/github-script@v7
        with:
          script: |
            const reviews = `${{ steps.review.outputs.reviews }}`;
            if (reviews.trim()) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: `## Skill Review Results\n\n${reviews}`
              });
            }