name: Review Skills

on:
  pull_request:
    paths:
      - 'tiles/**/SKILL.md'
      - '.tessl/tiles/**/SKILL.md'

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get changed skill files
        id: changed
        run: |
          SKILLS=$(gh api repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/files --jq '.[].filename' | grep 'SKILL.md$' || true)
          echo "skills<<EOF" >> $GITHUB_OUTPUT
          echo "$SKILLS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Install Tessl CLI
        if: steps.changed.outputs.skills != ''
        run: |
          curl -fsSL https://get.tessl.io | sh

      - name: Review skills
        if: steps.changed.outputs.skills != ''
        run: |
          echo "" > reviews.md
          for skill in ${{ steps.changed.outputs.skills }}; do
            if [ -f "$skill" ]; then
              echo "### Review: $skill" >> reviews.md
              echo "" >> reviews.md
              echo '```' >> reviews.md
              tessl skill review "$skill" >> reviews.md 2>&1 || true
              echo '```' >> reviews.md
              echo "" >> reviews.md
            fi
          done

      - name: Comment on PR
        if: steps.changed.outputs.skills != ''
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const reviews = fs.readFileSync('reviews.md', 'utf8');
            if (reviews.trim()) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: `## Skill Review Results\n\n${reviews}`
              });
            }